services:

  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins-tp01
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
    restart: always

  laravel-agent:
    build: .
    container_name: jenkins-laravel-agent
    privileged: true
    environment:
      - JENKINS_AGENT_SSH_PUBKEY=ssh-rsa  macbook@MacBooks-MacBook-Pro-2.local

volumes:
  jenkins_home: